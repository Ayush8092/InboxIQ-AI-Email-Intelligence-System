global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "aeoa_api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "celery_worker"
    static_configs:
      - targets: ["host.docker.internal:5555"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 15s