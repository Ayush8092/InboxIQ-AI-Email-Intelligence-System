services:

  - type: web
    name: aeoa-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.routes:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: JWT_SECRET
        generateValue: true
      - key: AEOA_ENCRYPTION_KEY
        sync: false
      - key: AEOA_API_KEY
        generateValue: true
      - key: AEOA_ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DB_PATH
        value: /tmp/aeoa.db
      - key: RATE_LIMITS
        value: process_emails:50:3600,gmail_fetch:10:3600,train_model:5:3600,generate_reply:30:3600
      - key: ENDPOINT_TIMEOUT_S
        value: "30"
      - key: MIDDLEWARE_TIMEOUT_S
        value: "35"
      - key: IDEMPOTENCY_TTL_S
        value: "86400"
      - key: CB_FAILURE_THRESHOLD
        value: "5"
      - key: CB_RECOVERY_TIMEOUT
        value: "60"

  - type: web
    name: aeoa-ui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ui/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: AEOA_ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_REDIRECT_URI
        sync: false
      - key: DB_PATH
        value: /tmp/aeoa.db